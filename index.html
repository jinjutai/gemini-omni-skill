<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gemini Omni Prompt 101 — Download Skill</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #fff;
      padding: 2rem;
    }

    .card {
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      padding: 3rem 2.5rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
    }

    .icon {
      font-size: 3.5rem;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      background: linear-gradient(90deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: rgba(255,255,255,0.6);
      font-size: 0.95rem;
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    .features {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      margin-bottom: 2rem;
      text-align: left;
    }

    .feature-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.9rem;
      color: rgba(255,255,255,0.75);
    }

    .feature-item span:first-child {
      font-size: 1rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: #fff;
      border: none;
      padding: 1rem 2.5rem;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
      box-shadow: 0 4px 20px rgba(124,58,237,0.5);
      text-decoration: none;
    }

    .btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(124,58,237,0.7);
    }

    .btn:active:not(:disabled) { transform: translateY(0); }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .counter {
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.4);
    }

    .counter strong {
      color: #a78bfa;
    }

    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: rgba(16, 185, 129, 0.9);
      color: #fff;
      padding: 0.75rem 1.25rem;
      border-radius: 10px;
      font-size: 0.9rem;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✨</div>
    <h1>Gemini Omni Prompt 101</h1>
    <p class="subtitle">
      Skill สำหรับ Claude Code ที่ช่วยให้คุณเขียน Prompt<br/>
      สำหรับ Gemini ได้อย่างมืออาชีพในทุกโหมด
    </p>

    <div class="features">
      <div class="feature-item"><span>✅</span><span>ครอบคลุมทุก Gemini Mode (Text, Vision, Audio, Video)</span></div>
      <div class="feature-item"><span>✅</span><span>Framework Prompt แบบ Omni ใช้งานได้จริง</span></div>
      <div class="feature-item"><span>✅</span><span>พร้อม Test Cases และตัวอย่างครบ</span></div>
    </div>

    <button class="btn" id="downloadBtn" onclick="handleDownload()">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      ดาวน์โหลด Skill
    </button>

    <div class="counter" id="counter" style="display:none">
      ดาวน์โหลดไปแล้ว <strong id="dlCount">—</strong> ครั้ง
    </div>
  </div>

  <div class="toast" id="toast">กำลังดาวน์โหลด...</div>

  <script>
    // ===== CONFIG — แก้ 2 บรรทัดนี้ =====
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwfzg_WsrARXvKGU6AnMlaOcmmVHxOPdtIiRZNv_BzTol5FKG9b2TZ3Q-SJaxcfdDGm/exec';
    const FILE_URL        = 'https://raw.githubusercontent.com/jinjutai/gemini-omni-skill/main/gemini-omni-prompt101.skill';
    // =====================================

    async function handleDownload() {
      const btn = document.getElementById('downloadBtn');
      btn.disabled = true;
      btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="spin"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg> กำลังโหลด...`;

      // เก็บข้อมูล geolocation จาก IP
      let geo = {};
      try {
        const res = await fetch('https://ipapi.co/json/');
        geo = await res.json();
      } catch (_) {}

      // ส่งข้อมูลไป Google Sheets (fire & forget — ไม่รอ response)
      try {
        const params = new URLSearchParams({
          country: geo.country_name || 'Unknown',
          country_code: geo.country_code || '',
          city:    geo.city    || 'Unknown',
          region:  geo.region  || 'Unknown',
          ip:      geo.ip      || 'Unknown',
          ua:      navigator.userAgent.substring(0, 200),
        });
        fetch(`${APPS_SCRIPT_URL}?${params}`, { mode: 'no-cors' });
      } catch (_) {}

      // แสดง toast แล้วเริ่ม download
      showToast();
      setTimeout(() => { window.location.href = FILE_URL; }, 400);

      // คืนสถานะปุ่ม
      setTimeout(() => {
        btn.disabled = false;
        btn.innerHTML = `<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> ดาวน์โหลด Skill`;
      }, 3000);
    }

    function showToast() {
      const t = document.getElementById('toast');
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }
  </script>
</body>
</html>
